<svg width="100%" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title logo-desc">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap');
    </style>
  </defs>
  <title id="logo-title">VoidCrawl Docs Logo</title>
  <desc id="logo-desc">VoidCrawl Docs logo — monochrome periodic table tile on a light background</desc>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="500" fill="#f5f5f5"/>
  <!-- Atomic number top-left -->
  <text x="58" y="82"
    font-family="Inter, system-ui, sans-serif"
    font-size="26" font-weight="700"
    fill="#000000" opacity="0.7"
  >401</text>

  <!-- Float top-right -->
  <text x="442" y="82"
    font-family="Inter, system-ui, sans-serif"
    font-size="26" font-weight="700"
    fill="#000000" opacity="0.7"
    text-anchor="end"
  >330.26</text>

  <!-- Symbol -->
  <text x="250" y="310"
    font-family="Inter, system-ui, sans-serif"
    font-size="200" font-weight="800"
    fill="#000000" opacity="0.9"
    text-anchor="middle"
  >Vd</text>

  <!-- Element name -->
  <text x="250" y="382"
    font-family="Inter, system-ui, sans-serif"
    font-size="28" font-weight="400"
    fill="#000000" opacity="0.6"
    text-anchor="middle" letter-spacing="3"
  >VoidCrawl Docs</text>
</svg>
