name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Initial Checks
      options:
        - label: I'm using the latest version of {{PROJECT_NAME}}
          required: true
        - label: I've searched existing issues before opening this one
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        A clear description of the bug. Include what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        Provide a minimal, reproducible example. Include commands, code, or configuration that triggers the bug.
        The easier it is to reproduce, the faster we can fix it.
      placeholder: |
        1. Run `...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste the full error message or relevant log output.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: "{{PROJECT_NAME}} Version"
      description: "Paste the page URL or note which documented version is affected"
      placeholder: "e.g., {{DOCS_URL}}/quickstart or v0.1.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: What OS and architecture are you using? (see `uname -orsm`)
      placeholder: e.g., Linux 6.x x86_64, macOS 15 arm64, Windows 11 x86_64
    validations:
      required: true
